<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8" />
<style>
  body { width: 280px; padding: 16px; font-family: -apple-system, Segoe UI, Inter, sans-serif; background:#101319; color:#f2f4f7; }
  h2 { font-size: 15px; margin: 0 0 12px; }
  input { width: 100%; box-sizing: border-box; padding: 8px 10px; margin-bottom: 8px; border-radius: 8px; border: 1px solid #2a2f3a; background:#1a1e27; color:#f2f4f7; }
  button { width: 100%; padding: 9px; border: none; border-radius: 8px; background: #4f7cff; color: white; font-weight: 600; cursor: pointer; margin-top: 4px;}
  .row { display:flex; align-items:center; justify-content:space-between; margin: 10px 0; }
  .status { font-size: 12px; color: #9aa3af; margin-top: 8px; }
  .hidden { display: none; }
  a { color: #4f7cff; font-size: 12px; }
</style>
</head>
<body>
  <div id="login-view">
    <h2>Sign in to Focus Lock</h2>
    <input id="email" type="email" placeholder="Student email" />
    <input id="password" type="password" placeholder="Password" />
    <button id="login-btn">Sign In</button>
    <p class="status" id="login-status"></p>
  </div>

  <div id="app-view" class="hidden">
    <h2>Smart Focus Lock</h2>
    <div class="row">
      <span>Blocking active</span>
      <input type="checkbox" id="toggle" />
    </div>
    <button id="sync-btn">Sync blocklist now</button>
    <p class="status" id="sync-status"></p>
    <p><a href="http://localhost:5173" target="_blank">Open dashboard →</a></p>
    <button id="logout-btn" style="background:#2a2f3a; margin-top:16px;">Log out</button>
  </div>

  <script src="popup.js"></script>
</body>
</html>
